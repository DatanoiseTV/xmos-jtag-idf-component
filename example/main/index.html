<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JTAG Programmer</title>
<style>
  :root {
    --bg: #111; --surface: #1a1a1a; --surface2: #222; --border: #333;
    --text: #d4d4d4; --text2: #888; --text3: #555;
    --accent: #6ea8fe; --accent-dim: rgba(110,168,254,0.1);
    --ok: #7ec88b; --ok-dim: rgba(126,200,139,0.1);
    --warn: #e0a458; --warn-dim: rgba(224,164,88,0.1);
    --err: #e06060; --err-dim: rgba(224,96,96,0.1);
    --radius: 4px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Inter', -apple-system, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; padding: 1.5rem 1rem;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 680px; margin: 0 auto; }

  /* Header */
  header { display:flex; align-items:baseline; gap:0.6rem; margin-bottom:1.5rem; }
  header h1 { font-size:1.1rem; font-weight:600; letter-spacing:-0.02em; color:var(--text); }
  header .badge {
    font-size:0.6rem; font-weight:500; text-transform:uppercase; letter-spacing:0.06em;
    padding:0.15rem 0.45rem; border-radius:2px;
    background:var(--accent-dim); color:var(--accent); border:1px solid rgba(110,168,254,0.2);
  }

  /* Card */
  .card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius); padding:1rem 1.1rem; margin-bottom:0.75rem;
  }
  .card-hdr {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:0.7rem;
  }
  .card-hdr h2 {
    font-size:0.65rem; font-weight:600; text-transform:uppercase;
    letter-spacing:0.08em; color:var(--text3);
  }
  .card-hdr .tag {
    font-size:0.55rem; padding:0.1rem 0.35rem; border-radius:2px;
    font-weight:500;
  }
  .tag-ok { background:var(--ok-dim); color:var(--ok); }
  .tag-warn { background:var(--warn-dim); color:var(--warn); }
  .tag-err { background:var(--err-dim); color:var(--err); }
  .tag-info { background:var(--accent-dim); color:var(--accent); }

  /* Grid */
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:0.5rem 1rem; }
  .grid.g3 { grid-template-columns:1fr 1fr 1fr; }
  .field label { display:block; font-size:0.6rem; color:var(--text3); text-transform:uppercase; letter-spacing:0.04em; margin-bottom:0.1rem; }
  .field .val { font-size:0.85rem; font-family:'SF Mono','Cascadia Code',monospace; color:var(--text); }
  .field .val.mono { color:var(--accent); }
  .field .val.ok { color:var(--ok); }
  .field .val.err { color:var(--err); }
  .field .val.dim { color:var(--text2); }

  /* Buttons */
  .btn-row { display:flex; gap:0.4rem; margin-top:0.7rem; }
  button, .btn {
    display:inline-flex; align-items:center; gap:0.3rem;
    padding:0.35rem 0.8rem; border:1px solid var(--border); border-radius:var(--radius);
    background:var(--surface2); color:var(--text2); font-size:0.75rem;
    cursor:pointer; transition:all 0.15s; font-family:inherit;
  }
  button:hover { border-color:var(--text3); color:var(--text); }
  button:disabled { opacity:0.3; cursor:not-allowed; }
  button.primary { background:var(--accent-dim); border-color:rgba(110,168,254,0.3); color:var(--accent); }
  button.primary:hover { background:rgba(110,168,254,0.2); }

  /* Chain */
  .chain { display:flex; align-items:center; gap:0; overflow-x:auto; padding:0.5rem 0; }
  .chain-wire { width:28px; height:1px; background:var(--border); flex-shrink:0; }
  .chain-wire.tdi { background:var(--accent); opacity:0.5; }
  .chain-wire.tdo { background:var(--ok); opacity:0.5; }
  .chain-pin { font-size:0.55rem; color:var(--text3); flex-shrink:0; font-weight:600; letter-spacing:0.04em; }
  .chain-dev {
    flex-shrink:0; border:1px solid var(--border); border-radius:var(--radius);
    padding:0.4rem 0.6rem; text-align:center; min-width:90px;
    background:var(--surface2); transition:border-color 0.2s;
  }
  .chain-dev:hover { border-color:var(--text3); }
  .chain-dev .dev-name { font-size:0.7rem; font-weight:600; color:var(--text); white-space:nowrap; }
  .chain-dev .dev-id { font-size:0.6rem; font-family:monospace; color:var(--accent); margin-top:0.15rem; }
  .chain-dev .dev-meta { font-size:0.55rem; color:var(--text3); }
  .chain-dev.highlight { border-color:var(--accent); background:var(--accent-dim); }
  .chain-dev.unknown { border-style:dashed; }

  /* File drop */
  .drop {
    border:1px dashed var(--border); border-radius:var(--radius);
    padding:1.5rem; text-align:center; cursor:pointer; transition:0.2s;
    position:relative; background:var(--surface2);
  }
  .drop:hover, .drop.over { border-color:var(--accent); background:var(--accent-dim); }
  .drop input { position:absolute; inset:0; opacity:0; cursor:pointer; }
  .drop .label { font-size:0.8rem; color:var(--text2); }
  .drop .hint { font-size:0.65rem; color:var(--text3); margin-top:0.25rem; }

  /* Progress */
  .pbar { height:3px; background:var(--border); border-radius:2px; overflow:hidden; margin-top:0.5rem; }
  .pbar .fill { height:100%; border-radius:2px; transition:width 0.3s; width:0%; background:var(--accent); }
  .pbar .fill.done { background:var(--ok); }
  .pbar .fill.error { background:var(--err); }

  .status { font-size:0.7rem; color:var(--text2); margin-top:0.35rem; font-family:monospace; }

  /* BSR */
  .bsr-bits { font-family:monospace; font-size:0.65rem; line-height:1.7; word-break:break-all; }
  .bsr-bits span { cursor:default; }
  .bsr-hex { font-family:monospace; font-size:0.7rem; color:var(--accent); word-break:break-all; }

  /* Table */
  table.info { width:100%; border-collapse:collapse; font-size:0.7rem; margin-top:0.5rem; }
  table.info th { text-align:left; color:var(--text3); font-weight:500; padding:0.2rem 0.5rem; border-bottom:1px solid var(--border); }
  table.info td { padding:0.2rem 0.5rem; border-bottom:1px solid var(--border); font-family:monospace; }

  /* Divider */
  hr { border:none; border-top:1px solid var(--border); margin:0.5rem 0; }

  /* Tabs for firmware type */
  .ftag { display:inline-block; padding:0.1rem 0.4rem; border-radius:2px; font-size:0.6rem; font-weight:600; }
  .ftag.xe { background:var(--accent-dim); color:var(--accent); }
  .ftag.elf { background:var(--ok-dim); color:var(--ok); }
  .ftag.bin { background:var(--warn-dim); color:var(--warn); }
  .ftag.svf { background:rgba(200,140,255,0.12); color:#c08cff; }

  .hidden { display:none !important; }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>JTAG Programmer</h1>
    <span class="badge">ESP-IDF</span>
  </header>

  <!-- Device -->
  <div class="card">
    <div class="card-hdr">
      <h2>Device</h2>
      <span class="tag tag-info" id="dev-status">--</span>
    </div>
    <div class="grid">
      <div class="field"><label>IDCODE</label><div class="val mono" id="idcode">--</div></div>
      <div class="field"><label>Family</label><div class="val" id="family">--</div></div>
      <div class="field"><label>Tiles</label><div class="val" id="tiles">--</div></div>
      <div class="field"><label>Revision</label><div class="val" id="revision">--</div></div>
    </div>
    <div class="btn-row">
      <button class="primary" onclick="identify()">Scan</button>
    </div>
  </div>

  <!-- Chain -->
  <div class="card hidden" id="chain-card">
    <div class="card-hdr"><h2>JTAG Chain</h2><span class="tag tag-info" id="chain-count">0</span></div>
    <div id="chain-view"></div>
  </div>

  <!-- Boundary Scan -->
  <div class="card hidden" id="bscan-card">
    <div class="card-hdr"><h2>Boundary Scan</h2><span class="tag tag-info" id="bsr-len">--</span></div>
    <div class="btn-row" style="margin-top:0">
      <button onclick="bscan()">Capture</button>
      <button onclick="bscanAuto()" id="btn-auto">Auto</button>
    </div>
    <div id="bsr-display" class="hidden" style="margin-top:0.5rem">
      <div class="bsr-hex" id="bsr-hex"></div>
      <div class="bsr-bits" id="bsr-bits" style="margin-top:0.3rem"></div>
    </div>
  </div>

  <!-- Firmware Upload -->
  <div class="card">
    <div class="card-hdr"><h2>Firmware</h2></div>
    <div class="drop" id="dropzone">
      <input type="file" id="fileInput" accept=".xe,.bin,.elf,.svf">
      <div class="label">Drop firmware file</div>
      <div class="hint">.xe .bin .elf .svf</div>
    </div>
    <div id="fw-info" class="hidden" style="margin-top:0.6rem">
      <div class="grid">
        <div class="field"><label>File</label><div class="val" id="fw-name">--</div></div>
        <div class="field"><label>Type</label><div class="val" id="fw-type">--</div></div>
        <div class="field"><label>Size</label><div class="val" id="fw-size">--</div></div>
        <div class="field"><label>Code</label><div class="val" id="fw-code">--</div></div>
        <div class="field"><label>Tiles</label><div class="val" id="fw-tiles">--</div></div>
        <div class="field"><label>Segments</label><div class="val" id="fw-segs">--</div></div>
        <div class="field"><label>Entry T0</label><div class="val mono" id="fw-entry0">--</div></div>
        <div class="field"><label>Entry T1</label><div class="val mono" id="fw-entry1">--</div></div>
      </div>
    </div>
  </div>

  <!-- Program -->
  <div class="card">
    <div class="card-hdr"><h2>Program</h2></div>
    <div class="btn-row" style="margin-top:0">
      <button class="primary" id="btn-ram" onclick="flash('ram')" disabled>Load to RAM</button>
      <button id="btn-flash" onclick="flash('flash')" disabled>Write Flash</button>
      <button id="btn-svf" onclick="playSvf()" disabled>Play SVF</button>
    </div>
    <div class="pbar hidden" id="pbar"><div class="fill" id="pfill"></div></div>
    <div class="status" id="status"></div>
  </div>

</div>

<script>
const $=id=>document.getElementById(id);
const fmt=n=>n>=1048576?(n/1048576).toFixed(1)+' MB':n>=1024?(n/1024).toFixed(1)+' KB':n+' B';
let uploadedType='';

async function identify(){
  try{
    try{const r=await fetch('/api/chain');const d=await r.json();renderChain(d.devices||[]);}catch(e){}
    const r=await fetch('/api/identify');const d=await r.json();
    $('idcode').textContent=d.idcode;
    $('family').textContent=d.family;
    $('family').className='val'+(d.ok?' ok':' err');
    $('tiles').textContent=d.tiles;
    $('revision').textContent=d.revision;
    $('dev-status').textContent=d.ok?'Connected':'No device';
    $('dev-status').className='tag '+(d.ok?'tag-ok':'tag-err');
    if(d.ok){updateButtons();if(d.bsr_len>0){show('bscan-card');$('bsr-len').textContent=d.bsr_len+' bits';}}
  }catch(e){$('family').textContent='Error';$('family').className='val err';$('dev-status').textContent='Error';$('dev-status').className='tag tag-err';}
}

function renderChain(devs){
  if(!devs||!devs.length){$('chain-view').innerHTML='<div style="font-size:0.7rem;color:var(--text3)">No devices</div>';show('chain-card');return;}
  let h='<div class="chain"><div class="chain-pin" style="color:var(--accent)">TDI</div><div class="chain-wire tdi"></div>';
  devs.forEach((d,i)=>{
    const cls=d.name.startsWith('XMOS')?'highlight':d.name==='Unknown'?'unknown':'';
    h+='<div class="chain-dev '+cls+'"><div class="dev-name">'+d.name+'</div><div class="dev-id">'+d.idcode+'</div>';
    h+='<div class="dev-meta">'+d.manufacturer+' / '+d.part+'</div></div>';
    if(i<devs.length-1)h+='<div class="chain-wire"></div>';
  });
  h+='<div class="chain-wire tdo"></div><div class="chain-pin" style="color:var(--ok)">TDO</div></div>';
  $('chain-view').innerHTML=h;$('chain-count').textContent=devs.length+' device'+(devs.length>1?'s':'');show('chain-card');
}

function show(id){$(id).classList.remove('hidden');}
function updateButtons(){
  const ok=$('family').classList.contains('ok')&&!$('fw-info').classList.contains('hidden');
  $('btn-ram').disabled=!ok||uploadedType==='svf';
  $('btn-flash').disabled=!ok||uploadedType==='svf';
  $('btn-svf').disabled=uploadedType!=='svf';
}

let autoTimer=null;
async function bscan(){
  try{const r=await fetch('/api/bscan');const d=await r.json();show('bsr-display');$('bsr-hex').textContent=d.hex;
    let h='';const b=d.bits;for(let i=0;i<b.length;i++){const c=b[i]==='1'?'var(--ok)':'var(--border)';h+='<span title="bit '+(b.length-1-i)+'" style="color:'+c+'">'+b[i]+'</span>';if((i+1)%8===0&&i<b.length-1)h+=' ';}
    $('bsr-bits').innerHTML=h;
  }catch(e){$('bsr-hex').textContent='Error';}
}
function bscanAuto(){if(autoTimer){clearInterval(autoTimer);autoTimer=null;$('btn-auto').textContent='Auto';return;}autoTimer=setInterval(bscan,500);$('btn-auto').textContent='Stop';bscan();}

const dz=$('dropzone'),fi=$('fileInput');
['dragenter','dragover'].forEach(e=>dz.addEventListener(e,ev=>{ev.preventDefault();dz.classList.add('over');}));
['dragleave','drop'].forEach(e=>dz.addEventListener(e,ev=>{ev.preventDefault();dz.classList.remove('over');}));
dz.addEventListener('drop',ev=>{if(ev.dataTransfer.files.length)upload(ev.dataTransfer.files[0]);});
fi.addEventListener('change',()=>{if(fi.files.length)upload(fi.files[0]);});

async function upload(file){
  $('status').textContent='Uploading '+file.name+'...';$('fw-name').textContent=file.name;
  uploadedType=file.name.endsWith('.svf')?'svf':'';
  try{
    const r=await fetch('/api/upload',{method:'POST',body:file});const d=await r.json();
    if(!d.ok)throw new Error('Rejected');
    const tt={xe:'xe',elf:'elf',bin:'bin',svf:'svf'}[d.type]||'bin';
    $('fw-type').innerHTML='<span class="ftag '+tt+'">'+d.type.toUpperCase()+'</span>';
    $('fw-size').textContent=fmt(d.size);$('fw-code').textContent=fmt(d.code_size);
    $('fw-tiles').textContent=d.tiles;$('fw-segs').textContent=d.segments;
    $('fw-entry0').textContent=d.entry0==='0x00000000'?'boot ROM':d.entry0;
    $('fw-entry1').textContent=d.entry1==='0x00000000'?'boot ROM':d.entry1;
    show('fw-info');$('status').textContent='Ready.';
    if(uploadedType==='svf'){$('fw-tiles').textContent='--';$('fw-segs').textContent='--';$('fw-entry0').textContent='--';$('fw-entry1').textContent='--';$('fw-code').textContent=fmt(d.size);}
    updateButtons();
  }catch(e){$('status').textContent='Upload failed: '+e.message;}
}

let pollTimer=null;
async function flash(mode){
  disableAll();show('pbar');$('pfill').style.width='0%';$('pfill').className='fill';$('status').textContent='Starting...';
  try{await fetch('/api/flash?mode='+mode,{method:'POST'});pollTimer=setInterval(poll,500);}catch(e){$('status').textContent='Failed: '+e.message;updateButtons();}
}
async function playSvf(){
  disableAll();show('pbar');$('pfill').style.width='0%';$('pfill').className='fill';$('status').textContent='Playing SVF...';
  try{await fetch('/api/svf',{method:'POST'});pollTimer=setInterval(poll,500);}catch(e){$('status').textContent='Failed: '+e.message;updateButtons();}
}
function disableAll(){$('btn-ram').disabled=$('btn-flash').disabled=$('btn-svf').disabled=true;}
async function poll(){
  try{const r=await fetch('/api/status');const d=await r.json();$('status').textContent=d.status;
    if(d.progress>=0)$('pfill').style.width=d.progress+'%';
    if(d.progress>=100||d.result<0){clearInterval(pollTimer);$('pfill').className='fill '+(d.result===0?'done':'error');updateButtons();}
  }catch(e){}
}
</script>
</body>
</html>
